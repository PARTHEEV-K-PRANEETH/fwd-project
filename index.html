<!DOCTYPE html>
<html>

<head>

<title>Habit Tracker</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<!-- LOGIN PAGE -->

<div id="loginPage" class="auth-box">

<h2>Login</h2>

<input type="text" id="loginUser" placeholder="Username">

<input type="password" id="loginPass" placeholder="Password">

<button onclick="login()">Login</button>

<p>No account?</p>

<button onclick="showSignup()">Sign Up</button>

</div>


<!-- SIGNUP PAGE -->

<div id="signupPage" class="auth-box" style="display:none;">

<h2>Sign Up</h2>

<input type="text" id="signupUser" placeholder="Username">

<input type="password" id="signupPass" placeholder="Password">

<button onclick="signup()">Create Account</button>

<p>Already have account?</p>

<button onclick="showLogin()">Login</button>

</div>


<!-- DASHBOARD -->

<div id="dashboard" style="display:none;">

<h1>Habit Tracker Dashboard</h1>

<button onclick="logout()">Logout</button>

<div class="add-habit">

<input type="text" id="habitName" placeholder="Enter habit name">

<button onclick="addHabit()">Add Habit</button>

</div>

<div id="habitList"></div>


<h2>Monthly Progress Graph</h2>

<canvas id="chart" height="150"></canvas>

<button onclick="generateChart()">Show Graph</button>


<h2>Individual Performance Intelligence</h2>

<div id="performanceResult"></div>

<button onclick="analyzePerformance()">Analyze Performance</button>

</div>

<script src="script.js"></script>

</body>

</html>
